events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Вказуємо Nginx використовувати внутрішній DNS-сервер Docker
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;

        # Проксі для API запитів
        location /api/ {
            # Ховаємо адресу в змінну, щоб уникнути помилки "host not found" при старті.
            # Зверни увагу: БЕЗ слеша наприкінці, щоб зберегти префікс /api/
            set $api_upstream http://api:5000;
            proxy_pass $api_upstream;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Проксі для Frontend (Production статика на порту 80)
        location / {
            # ВИПРАВЛЕНО: Змінили 5173 на 80
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}